<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منتجات TOOLS CODE</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<style>

.search{
width:90%;
max-width:700px;
margin:40px auto;
display:block;
padding:15px;
border-radius:12px;
border:none;
font-size:18px;
}

.products{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(260px,1fr));

gap:25px;

padding:40px;

}

.card{

background:#10284f;

border-radius:15px;

overflow:hidden;

transition:.3s;

position:relative;

}

.card:hover{

transform:translateY(-8px);

box-shadow:0 0 25px #1da1ff;

}

.card img{

width:100%;

height:180px;

object-fit:cover;

}

.card h3{

padding:15px;

}

.price{

color:#00ff84;

font-size:23px;

font-weight:bold;

padding:0 15px;

}

.card button{

margin:15px;

width:calc(100% - 30px);

padding:14px;

background:#1da1ff;

border:none;

border-radius:10px;

color:white;

cursor:pointer;

font-size:17px;

}

.badge{

position:absolute;

top:15px;

left:15px;

background:red;

padding:5px 12px;

border-radius:20px;

font-size:13px;

font-weight:bold;

}

</style>

</head>
